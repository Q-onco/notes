name = "enzo"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[vars]
ALLOWED_ORIGIN = "https://q-onco.github.io"

# ── R2 bucket (auto-created by CI) ───────────────────────────────────────────
[[r2_buckets]]
binding     = "QONCO_FILES"
bucket_name = "qonco-files"

# ── D1 database — uncomment after running: wrangler d1 create qonco-mail ─────
# Then paste the database_id from the output below.
# [[d1_databases]]
# binding       = "QONCO_MAIL"
# database_name = "qonco-mail"
# database_id   = "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

# Secrets (set via: wrangler secret put <NAME>)
#   GROQ_API_KEY
#   BREVO_API_KEY
