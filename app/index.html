<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" id="theme-meta" />
    <meta name="description" content="Q·onco — Research intelligence for Dr. Amritha" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <link rel="icon" id="anim-favicon" type="image/png" />
    <title>Q·onco</title>
  </head>
  <script>
  (function(){
    var c=document.createElement('canvas'),x=c.getContext('2d');
    c.width=c.height=64;
    var lnk=document.getElementById('anim-favicon');
    var CYCLE=1600,start=null;

    function dog(sc){
      x.clearRect(0,0,64,64);
      x.save();x.translate(32,27);x.scale(sc,sc);
      // Ears — deep chocolate
      x.fillStyle='#3E1F00';
      x.beginPath();x.ellipse(-20,3,9,13,0.3,0,Math.PI*2);x.fill();
      x.beginPath();x.ellipse(20,3,9,13,-0.3,0,Math.PI*2);x.fill();
      // Head — amber glow
      x.shadowColor='rgba(255,180,0,0.5)';x.shadowBlur=8;
      x.beginPath();x.arc(0,0,20,0,Math.PI*2);
      x.fillStyle='#FFB300';x.fill();
      x.shadowBlur=0;
      // Head highlight (clipped)
      x.save();
      x.beginPath();x.arc(0,0,20,0,Math.PI*2);x.clip();
      x.fillStyle='rgba(255,236,100,0.4)';
      x.beginPath();x.ellipse(-7,-7,12,10,0.4,0,Math.PI*2);x.fill();
      x.restore();
      // Muzzle — bright cream
      x.beginPath();x.ellipse(0,9,11,8,0,0,Math.PI*2);
      x.fillStyle='#FFE082';x.fill();
      // Eyes — jet black + large shine
      x.fillStyle='#000';
      x.beginPath();x.arc(-7,-6,3.5,0,Math.PI*2);x.fill();
      x.beginPath();x.arc(7,-6,3.5,0,Math.PI*2);x.fill();
      x.fillStyle='#FFF';
      x.beginPath();x.arc(-5.5,-7.5,1.5,0,Math.PI*2);x.fill();
      x.beginPath();x.arc(8.5,-7.5,1.5,0,Math.PI*2);x.fill();
      // Nose — pure black + glint
      x.fillStyle='#000';
      x.beginPath();x.ellipse(0,4,6,4,0,0,Math.PI*2);x.fill();
      x.fillStyle='rgba(255,255,255,0.45)';
      x.beginPath();x.arc(-2.5,2.5,2,0,Math.PI*2);x.fill();
      // Tongue — hot coral
      x.fillStyle='#FF4081';
      x.beginPath();x.arc(-4,22,6,0,Math.PI*2);x.fill();
      x.beginPath();x.arc(4,22,6,0,Math.PI*2);x.fill();
      x.fillStyle='rgba(255,180,200,0.5)';
      x.beginPath();x.arc(-3,19,3.5,0,Math.PI*2);x.fill();
      x.strokeStyle='#AA0044';x.lineWidth=1.5;
      x.beginPath();x.moveTo(0,16);x.lineTo(0,27);x.stroke();
      x.restore();
    }

    function pulse(t){
      if(t<0.1)  return 1+0.12*Math.sin(t/0.1*Math.PI);
      if(t<0.22) return 1+0.07*Math.sin((t-0.12)/0.1*Math.PI);
      return 1.0;
    }

    function tick(ts){
      if(!start)start=ts;
      dog(pulse(((ts-start)%CYCLE)/CYCLE));
      lnk.href=c.toDataURL();
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  })();
  </script>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
