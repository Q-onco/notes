<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" id="theme-meta" />
    <meta name="description" content="Q·onco — Research intelligence for Dr. Amritha" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <link rel="icon" id="anim-favicon" type="image/png" />
    <title>Q·onco</title>
  </head>
  <script>
  (function(){
    var c=document.createElement('canvas'),x=c.getContext('2d');
    c.width=c.height=64;
    var lnk=document.getElementById('anim-favicon');
    var CYCLE=1600,start=null;

    function dog(sc){
      x.clearRect(0,0,64,64);
      x.save();x.translate(32,28);x.scale(sc,sc);
      // Amber badge background
      x.beginPath();x.arc(0,1,25,0,Math.PI*2);
      x.fillStyle='#FF8F00';x.fill();
      // Ears — deep chocolate, pushed far out so they poke past the head
      x.fillStyle='#3E1F00';
      x.beginPath();x.ellipse(-22,0,10,13,0.25,0,Math.PI*2);x.fill();
      x.beginPath();x.ellipse(22,0,10,13,-0.25,0,Math.PI*2);x.fill();
      // Head — bright amber (smaller than ears centre-distance so ears show)
      x.beginPath();x.arc(0,0,17,0,Math.PI*2);
      x.fillStyle='#FFB300';x.fill();
      // Head highlight (clipped)
      x.save();x.beginPath();x.arc(0,0,17,0,Math.PI*2);x.clip();
      x.fillStyle='rgba(255,236,100,0.35)';
      x.beginPath();x.ellipse(-6,-6,11,9,0.4,0,Math.PI*2);x.fill();
      x.restore();
      // Muzzle — bright cream
      x.beginPath();x.ellipse(0,8,9,7,0,0,Math.PI*2);
      x.fillStyle='#FFE082';x.fill();
      // Eyes — larger so they read at 16 px
      x.fillStyle='#111';
      x.beginPath();x.arc(-6,-5,4,0,Math.PI*2);x.fill();
      x.beginPath();x.arc(6,-5,4,0,Math.PI*2);x.fill();
      x.fillStyle='#FFF';
      x.beginPath();x.arc(-4.5,-6.5,1.8,0,Math.PI*2);x.fill();
      x.beginPath();x.arc(7.5,-6.5,1.8,0,Math.PI*2);x.fill();
      // Nose — solid black, larger
      x.fillStyle='#111';
      x.beginPath();x.ellipse(0,3,6,4,0,0,Math.PI*2);x.fill();
      x.fillStyle='rgba(255,255,255,0.4)';
      x.beginPath();x.arc(-2,2,2,0,Math.PI*2);x.fill();
      // Tongue — hot pink, clearly below head
      x.fillStyle='#FF4081';
      x.beginPath();x.arc(-3.5,21,5.5,0,Math.PI*2);x.fill();
      x.beginPath();x.arc(3.5,21,5.5,0,Math.PI*2);x.fill();
      x.strokeStyle='#CC003A';x.lineWidth=1.5;
      x.beginPath();x.moveTo(0,16);x.lineTo(0,26);x.stroke();
      x.restore();
    }

    function pulse(t){
      if(t<0.1)  return 1+0.12*Math.sin(t/0.1*Math.PI);
      if(t<0.22) return 1+0.07*Math.sin((t-0.12)/0.1*Math.PI);
      return 1.0;
    }

    function tick(ts){
      if(!start)start=ts;
      dog(pulse(((ts-start)%CYCLE)/CYCLE));
      lnk.href=c.toDataURL();
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  })();
  </script>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
