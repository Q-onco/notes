name: Deploy to VPS (q-onco.phytolabs.in)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: app

      - name: Build for VPS (base path /)
        run: npm run build
        working-directory: app
        env:
          BASE_PATH: /

      - name: Fix PWA manifest base path
        run: sed -i 's|/notes/|/|g' app/dist/manifest.json

      - name: Deploy via rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.htaccess'
          path: app/dist/
          remote_path: /home/shiva/web/q-onco.phytolabs.in/public_html/
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}
          remote_port: 22
          rsh: ssh -q -o StrictHostKeyChecking=no

      - name: Fix ownership
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: chown -R shiva:shiva /home/shiva/web/q-onco.phytolabs.in/public_html/
