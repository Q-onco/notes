name: Deploy to VPS (q-onco.phytolabs.in)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Build and deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: "22422"
          timeout: 300s
          script: |
            set -e
            cd /root/notes-deploy
            git fetch origin main
            git reset --hard origin/main
            cd app
            npm ci --silent
            BASE_PATH=/ npm run build
            sed -i 's|/notes/|/|g' dist/manifest.json
            rsync -a --delete --exclude='.htaccess' dist/ /home/shiva/web/q-onco.phytolabs.in/public_html/
            chown -R shiva:shiva /home/shiva/web/q-onco.phytolabs.in/public_html/
            echo "Deploy complete"
